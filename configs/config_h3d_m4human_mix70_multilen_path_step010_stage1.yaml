NAME: VQVAE_HumanML3D_M4Human20Hz_mix70_lr2e5_multilen_path_step010_finetune
ACCELERATOR: 'gpu'
NUM_NODES: 1
DEVICE: [0, 1, 2, 3]

TRAIN:
  STAGE: vae
  NUM_WORKERS: 0
  BATCH_SIZE: 64
  END_EPOCH: 100
  PRETRAINED: experiments/mgpt/VQVAE_HumanML3D_M4Human20Hz_mix70_lr2e5_multilen_path_finetune/checkpoints/epoch=649.ckpt
  PRETRAINED_STRICT: False
  PRETRAINED_VAE: ''
  RESUME: ''
  BENCHMARK: True
  OPTIM:
    target: AdamW
    params:
      lr: 2e-5
      betas: [0.9, 0.99]
      weight_decay: 0.0

EVAL:
  BATCH_SIZE: 64
  NUM_WORKERS: 0
  SPLIT: test

TEST:
  CHECKPOINTS: checkpoints/MotionGPT-base/motiongpt_s3_h3d.tar
  SPLIT: test
  BATCH_SIZE: 64
  NUM_WORKERS: 0

DATASET:
  target: mGPT.data.MixedHumanML3DM4Human.MixedHumanML3DM4HumanDataModule
  M4HUMAN:
    CACHE_ROOT: /cpfs01/liangbo/data/MotionGPT/m4human_cache/v2_xz-y_param_joints_m4ref_20hz
    TRAIN_SUBSET: train
    MIX_RATIO: 0.7
    WINDOW_SIZE: 64
    WINDOW_SIZES: [64, 128, 196]
    WINDOW_WEIGHTS: [0.25, 0.25, 0.50]
    MIN_MOTION_LEN: 40
    MAX_SEQUENCES: 0

METRIC:
  TYPE: ['TM2TMetrics', 'MRMetrics']

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_TRAJ_FINAL: 0.02
  LAMBDA_TRAJ_PATH: 0.005
  LAMBDA_TRAJ_STEP: 0.01
  TRAJ_DOMAIN: m4human
  LAMBDA_VELOCITY: 0.5
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  ABLATION:
    RECONS_LOSS: 'l1_smooth'

model:
  target: mGPT.models.mgpt.MotionGPT
  params:
    condition: 'text'
    task: 't2m'
    lm: ${lm.default}
    motion_vae: ${vq.default}

LOGGER:
  TYPE: ['tensorboard']
  VAL_EVERY_STEPS: 50
  WANDB:
    params:
      project: null
